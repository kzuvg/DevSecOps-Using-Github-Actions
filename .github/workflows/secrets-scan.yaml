name: Secrets Scan

on:
  workflow_call:


jobs:
  secret-scan:
    runs-on: ubuntu-22.04

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

           
